<ng-content></ng-content>
@for (area of areas(); track area) {
  @if (!$last) {
    <div
      #gutter
      class="as-split-gutter"
      role="separator"
      [dir]="dir()"
      [attr.aria-label]="gutterAriaLabel()"
      [attr.aria-orientation]="direction()"
      [attr.aria-valuemin]="area.minSize()"
      [attr.aria-valuemax]="area.maxSize()"
      [attr.aria-valuenow]="area._normalizedSize() === '*' ? undefined : area._normalizedSize()"
      [attr.aria-valuetext]="getAriaAreaSizeText(area)"
      [ngStyle]="getGutterGridStyle($index + 1)"
      (click)="gutterClicked($event, $index)"
      (dblclick)="gutterDoubleClicked($index)"
      (mousedown)="gutterMouseDown($event, $index, $index, $index + 1)"
      (touchstart)="gutterMouseDown($event, $index, $index, $index + 1)"
    ></div>
  }
}
